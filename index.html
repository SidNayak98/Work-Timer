<!DOCTYPE html>
<html>
<head>
  <title>Work Timer</title>

  <style>

    
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      /* ✅ window now wraps content instead of filling screen */
      width: 360;
      height: 360;

      display: flex;
      align-items: center;
      justify-content: center;

      /* keep your nice aesthetic */
      background: transparent;

      /* important for Electron drag */
      -webkit-app-region: drag;
    }

    .glass {

      background: radial-gradient(circle at top,
        #3aa7ff,
        #0b1b2b
      );
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 20px;

      padding: 20px;
      width: 260px;

      text-align: center;
      box-shadow: 0 0 30px rgba(0, 180, 255, 0.25);
    }
    .ring {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 10px auto 20px auto;
      filter: drop-shadow(0 0 10px rgba(0, 200, 255, 0.5));
    }

    .ring svg {
      transform: rotate(-90deg) scale(1.2);

    }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.15);
      stroke-width: 10;
    }

    .ring-fg {
      fill: none;
      stroke: url(#grad);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 377;
      stroke-dashoffset: 377;
      transition: stroke-dashoffset 0.4s linear;
      filter: drop-shadow(0 0 8px rgba(0, 200, 255, 0.8));
    }

    .ring-center {
      position: absolute;
      top: 0;
      left: 0;
      width: 150px;
      height: 150px;

      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;

      
    }

    #time {
      font-size: 26px;
      margin: 0;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.6);
    }

    #mode {
      opacity: 0.8;
      letter-spacing: 2px;
      margin-top: 4px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 10px;
      align-items: stretch;   /* 🔥 important */
      width: 100%;
    }

    .controls button {
      width: 100%;            /* 🔥 makes all buttons equal */
      padding: 6px 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    
    button {
      margin: 0;          /* remove extra spacing */
      padding: 6px 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    button:hover {
      background: rgba(255,255,255,0.25);
    }

    #window-controls {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .close-btn {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 18px;
      line-height: 1;

      border-radius: 50%;
      border: none;
      cursor: pointer;

      background: rgba(255,255,255,0.15);
      color: white;
    }
  </style>
</head>

<body>

<div class="glass">

  <div id="window-controls">
    <button id="close-btn">✕</button>
  </div>

  <!-- RING -->
  <div class="ring">
    <svg width="150" height="150">
      <circle class="ring-bg" cx="75" cy="75" r="60"></circle>
      <circle id="ring" class="ring-fg" cx="75" cy="75" r="60"></circle>
    </svg>

    <div class="ring-center">
      <h1 id="time">00:00:00</h1>
      <h2 id="mode">WORK</h2>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <button id="work-toggle-btn">Start</button>
    <button id="break-btn">Start Break</button>
    <button id="reset-btn">Reset</button>
    <button id="export-logs-btn">Export Logs</button>

  </div>
</div>

<!-- gradient -->
<svg width="0" height="0">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3aa7ff" />
      <stop offset="50%" stop-color="#00e0ff" />
      <stop offset="100%" stop-color="#00ffa3" />
    </linearGradient>
  </defs>
</svg>

<script>
const timeEl = document.getElementById("time");
const modeEl = document.getElementById("mode");
const ring = document.getElementById("ring");

const workBtn = document.getElementById("work-toggle-btn");
const breakBtn = document.getElementById("break-btn");
const resetBtn = document.getElementById("reset-btn");
const exportBtn = document.getElementById("export-logs-btn");
const closeBtn = document.getElementById("close-btn");

const ding = new Audio("sound/ding.wav");
const chime = new Audio("sound/chime.wav");

let lastMode = window.timer.getState().mode;

/* =========================
   CLOSE → TRAY
========================= */
closeBtn.onclick = () => {
  window.windowControls.minimizeToTray();
};

/* =========================
   BUTTONS
========================= */
workBtn.onclick = () => window.timer.toggleWork();
resetBtn.onclick = () => window.timer.reset();
exportBtn.onclick = () => window.timer.exportLogs();

breakBtn.onclick = () => {
  const state = window.timer.getState();
  state.mode === "work"
    ? window.timer.startBreak()
    : window.timer.stopBreak();
};

/* =========================
   FORMAT
========================= */
function format(seconds) {
  const h = String(Math.floor(seconds / 3600)).padStart(2, "0");
  const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, "0");
  const s = String(seconds % 60).padStart(2, "0");
  return `${h}:${m}:${s}`;
}

/* =========================
   UPDATE LOOP
========================= */
const radius = 60;
const circumference = 2 * Math.PI * radius;

ring.style.strokeDasharray = circumference;

function update() {
  const state = window.timer.getState();

  /* sound */
  if (state.mode !== lastMode) {
    (state.mode === "break" ? chime : ding).play();
    lastMode = state.mode;
  }

  /* timer */
  if (state.mode === "work") {
    timeEl.textContent = format(state.workElapsed);
  } else {
    timeEl.textContent = format(state.breakRemaining);
  }

  modeEl.textContent = state.mode.toUpperCase();

  /* WORK BUTTON TOGGLE */
  workBtn.textContent = state.running ? "Pause" : "Start";

  /* BREAK BUTTON TEXT */
  breakBtn.textContent =
    state.mode === "work" ? "Start Break" : "Stop Break";

  /* hide buttons during break */
  const inWork = state.mode === "work";

  const hideDuringBreak = (el) => {
    el.style.opacity = inWork ? "1" : "0";
    el.style.pointerEvents = inWork ? "auto" : "none";
  };

  hideDuringBreak(workBtn);
  hideDuringBreak(resetBtn);
  hideDuringBreak(exportBtn);

  /* ring */
  const progress = state.workElapsed / state.workDayLimit;
  ring.style.strokeDashoffset =
    circumference * (1 - Math.min(Math.max(progress, 0), 1));
}

setInterval(update, 300);
</script>

</body>
</html>
